name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  branch-policy:
    name: Branch Policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git remote add source https://github.com/crshdn/mission-control.git
      - run: git fetch --no-tags --depth=1 origin main
      - run: git fetch --no-tags --depth=1 source main
      - run: bash scripts/git-branch-policy.sh check

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/docs-sanity.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.13.0
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.13.0
          cache: npm
      - run: npm ci
      - run: npm run build
